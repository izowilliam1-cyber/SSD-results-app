name: ssd_results_app
description: SSD Results App - Check exam results with countdown and leaderboard.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  firebase_database: ^10.2.0
  firebase_messaging: ^14.6.0
  http: ^1.1.0
  provider: ^6.0.0
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^3.0.0

flutter:
  uses-material-design: true